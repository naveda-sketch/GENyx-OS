<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts — cargado una sola vez para todo el app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <title>GenyX — Tu operación comercial autónoma</title>

    <!-- SEO -->
    <meta name="description" content="8 agentes de IA que operan, miden y planean tu negocio. Desde la primera conversación hasta tu estrategia financiera. Activo en 48h. Cero comisión por venta." />
    <link rel="canonical" href="https://genyxsystems.com" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://genyxsystems.com" />
    <meta property="og:title" content="GenyX — Tu operación comercial autónoma" />
    <meta property="og:description" content="8 agentes de IA que operan el 90% de tu dirección comercial. Activo en 48h. Desde $9,900 MXN/mes. Sin comisiones." />
    <meta property="og:image" content="https://genyxsystems.com/genyx-logo.png" />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GenyX — Tu operación comercial autónoma" />
    <meta name="twitter:description" content="8 agentes de IA que operan, miden y planean tu negocio. Activo en 48h." />
    <meta name="twitter:image" content="https://genyxsystems.com/genyx-logo.png" />

    <!-- ── PWA: Add to Home Screen ─────────────────────────────────────── -->
    <!-- El manifest se inyecta dinámicamente por JS según el hostname -->
    <link id="pwa-manifest" rel="manifest" href="/manifest-os.json" />
    <link id="site-favicon" rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS Safari "Add to Home Screen" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GenyX" />
    <link rel="apple-touch-icon" href="/genyx-logo.png" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" id="pwa-theme" content="#060912" />

    <!-- Ajusta manifest y theme según dominio + path -->
    <script>
      (function() {
        var h = window.location.hostname;
        var p = window.location.pathname;
        var isMandoPaty = h.startsWith('mando.') && p.startsWith('/panaderia-paty');
        var isOS = h.startsWith('os.') || (h.startsWith('mando.') && !p.startsWith('/panaderia-paty'));
        if (isMandoPaty) {
          document.title = 'Paty HomeBakery — Centro de Mando';
          document.getElementById('pwa-manifest').href = '/manifest-paty.json';
          document.getElementById('pwa-theme').content = '#92400e';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'Mando Paty';
          document.querySelector('link[rel="apple-touch-icon"]').href = '/paty-icon.png';
          document.getElementById('site-favicon').href = '/paty-icon.png';
          document.getElementById('site-favicon').type = 'image/png';
        } else if (isOS) {
          document.title = 'GenyX — Panel de Operaciones';
          document.getElementById('pwa-manifest').href = '/manifest-os.json';
          document.getElementById('pwa-theme').content = '#6366f1';
          document.querySelector('meta[name="apple-mobile-web-app-title"]').content = 'GenyX';
        } else if (h.includes('genyxsystems') || h.includes('genyx')) {
          document.title = 'GenyX — Tu operación comercial autónoma';
          document.getElementById('pwa-theme').content = '#818cf8';
        }
      })();
    </script>
    <!-- ──────────────────────────────────────────────────────────────────── -->

    <style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #060912; } @media print { .glow-orb { display: none !important; } }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Service Worker + Install Prompt ─────────────────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('[SW] Registered:', reg.scope);
          }).catch(function(err) {
            console.log('[SW] Registration failed:', err);
          });
        });
      }
      // Capture install prompt — React reads window.__pwaPrompt
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
        window.dispatchEvent(new Event('pwa-ready'));
      });
    </script>
  </body>
</html>
